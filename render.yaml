# Render.com Blueprint - Stock Tracker Backend
# Place this file in the root: render.yaml
# IMPORTANT: Never commit real credentials to Git!

services:
  - type: web
    name: stock-tracker-api
    env: python
    region: singapore
    plan: free
    branch: main
    repo: https://github.com/tienyulin/stock-tracker.git
    rootDirectory: .
    buildCommand: pip install -r requirements.txt --prefer-binary
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    pythonVersion: "3.12"
    # Environment variables should be set in Render Dashboard
    # See .env.example for required variables
