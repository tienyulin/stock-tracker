version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-tracker-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/stocktracker
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - stock-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stock-tracker-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - stock-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: stock-tracker-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=stocktracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - stock-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stock-tracker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stock-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  stock-network:
    driver: bridge
